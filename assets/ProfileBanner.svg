<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e17"/>
      <stop offset="40%" stop-color="#0d1321"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>

    <!-- Accent glow gradient (Ukrainian blue) -->
    <radialGradient id="glowBlue" cx="25%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#0057b7" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0057b7" stop-opacity="0"/>
    </radialGradient>

    <!-- Accent glow gradient (Ukrainian yellow) -->
    <radialGradient id="glowYellow" cx="80%" cy="30%" r="30%">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ffd700" stop-opacity="0"/>
    </radialGradient>

    <!-- MVP badge gradient -->
    <linearGradient id="mvpGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0078d4"/>
      <stop offset="100%" stop-color="#005a9e"/>
    </linearGradient>

    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5" opacity="0.4"/>
    </pattern>

    <!-- Dot pattern -->
    <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="0.6" fill="#334155" opacity="0.5"/>
    </pattern>

    <!-- Circuit line filter glow -->
    <filter id="lineGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Text shadow -->
    <filter id="textShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0057b7" flood-opacity="0.3"/>
    </filter>

    <!-- MVP glow -->
    <filter id="mvpGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Code text glow -->
    <filter id="codeGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Base background -->
  <rect width="800" height="300" fill="url(#bgGrad)"/>

  <!-- Grid overlay -->
  <rect width="800" height="300" fill="url(#grid)"/>
  <rect width="800" height="300" fill="url(#dots)"/>

  <!-- Ambient glow layers -->
  <rect width="800" height="300" fill="url(#glowBlue)"/>
  <rect width="800" height="300" fill="url(#glowYellow)"/>

  <!-- Decorative circuit/code lines - left side -->
  <g opacity="0.25" filter="url(#lineGlow)">
    <!-- Horizontal lines -->
    <line x1="0" y1="60" x2="120" y2="60" stroke="#0057b7" stroke-width="1"/>
    <line x1="0" y1="90" x2="80" y2="90" stroke="#0057b7" stroke-width="0.7"/>
    <line x1="0" y1="210" x2="60" y2="210" stroke="#ffd700" stroke-width="0.7"/>
    <line x1="0" y1="240" x2="110" y2="240" stroke="#0057b7" stroke-width="1"/>

    <!-- Vertical branches -->
    <line x1="120" y1="60" x2="120" y2="100" stroke="#0057b7" stroke-width="1"/>
    <line x1="80" y1="90" x2="80" y2="120" stroke="#0057b7" stroke-width="0.7"/>
    <line x1="60" y1="210" x2="60" y2="180" stroke="#ffd700" stroke-width="0.7"/>
    <line x1="110" y1="240" x2="110" y2="265" stroke="#0057b7" stroke-width="1"/>

    <!-- Junction dots -->
    <circle cx="120" cy="60" r="3" fill="#0057b7"/>
    <circle cx="80" cy="90" r="2" fill="#0057b7"/>
    <circle cx="60" cy="210" r="2" fill="#ffd700"/>
    <circle cx="110" cy="240" r="3" fill="#0057b7"/>
    <circle cx="120" cy="100" r="2" fill="#0057b7"/>
    <circle cx="80" cy="120" r="2" fill="#0057b7"/>
    <circle cx="60" cy="180" r="2" fill="#ffd700"/>
  </g>

  <!-- Decorative circuit lines - right side -->
  <g opacity="0.2" filter="url(#lineGlow)">
    <line x1="800" y1="75" x2="700" y2="75" stroke="#ffd700" stroke-width="0.7"/>
    <line x1="800" y1="105" x2="720" y2="105" stroke="#0057b7" stroke-width="1"/>
    <line x1="800" y1="195" x2="710" y2="195" stroke="#0057b7" stroke-width="0.7"/>
    <line x1="800" y1="235" x2="690" y2="235" stroke="#ffd700" stroke-width="1"/>

    <line x1="700" y1="75" x2="700" y2="45" stroke="#ffd700" stroke-width="0.7"/>
    <line x1="720" y1="105" x2="720" y2="135" stroke="#0057b7" stroke-width="1"/>
    <line x1="710" y1="195" x2="710" y2="165" stroke="#0057b7" stroke-width="0.7"/>
    <line x1="690" y1="235" x2="690" y2="270" stroke="#ffd700" stroke-width="1"/>

    <circle cx="700" cy="75" r="2" fill="#ffd700"/>
    <circle cx="720" cy="105" r="3" fill="#0057b7"/>
    <circle cx="710" cy="195" r="2" fill="#0057b7"/>
    <circle cx="690" cy="235" r="3" fill="#ffd700"/>
  </g>

  <!-- Floating code fragments (AL-style) - decorative background text -->
  <g opacity="0.18" font-family="'Courier New', Courier, monospace" fill="#ffd700" filter="url(#codeGlow)">
    <text x="30" y="38" font-size="11">BindSubscription(SingleInstanceStorage)</text>
    <text x="480" y="33" font-size="10">NormalDate(NoOfPeriodRec."Period End")</text>
    <text x="40" y="268" font-size="10">IsFound := DataOperations.FindRecord(xRecRef)</text>
    <text x="530" y="285" font-size="11">FieldRef.Value(NewValue)</text>
    <text x="600" y="50" font-size="10">TempBlob.CreateInStream(FileInStream, TextEncoding::UTF8)</text>
    <text x="20" y="150" font-size="10">[EventSubscriber(ObjectType::Codeunit)]</text>
    <text x="570" y="150" font-size="10">CommitBehavior(CommitBehavior::Ignore)</text>
    <text x="270" y="18" font-size="10">HasError := not Codeunit.Run()</text>
    <text x="20" y="118" font-size="10">Evaluate(DateFormula, DateFormulaAsText)</text>
    <text x="450" y="255" font-size="10">JsonToken.ReadFrom(ResponseText)</text>
    <text x="630" y="118" font-size="11">Email.Enqueue(EmailMessage, EmailAccount)</text>
    <text x="170" y="293" font-size="10">TxtBuilder.Append(NewValue)</text>
  </g>

  <!-- BC Logo mark - stylized hexagonal shape -->
  <g transform="translate(68, 108)">
    <g opacity="0.9">
      <!-- Outer hexagon ring -->
      <polygon points="40,0 80,23 80,69 40,92 0,69 0,23"
               fill="none" stroke="#0057b7" stroke-width="1.5" opacity="0.6"/>
      <!-- Inner hexagon -->
      <polygon points="40,13 69,30 69,62 40,79 11,62 11,30"
               fill="#0057b7" fill-opacity="0.1" stroke="#0057b7" stroke-width="0.8" opacity="0.8"/>
      <!-- BC letters -->
      <text x="40" y="53" text-anchor="middle" font-family="'Segoe UI', Tahoma, sans-serif"
            font-size="26" font-weight="700" fill="#e2e8f0" letter-spacing="2">BC</text>
    </g>
  </g>

  <!-- Main content group -->
  <g transform="translate(185, 0)">

    <!-- Name -->
    <text x="0" y="112" font-family="'Segoe UI', Tahoma, Geneva, sans-serif"
          font-size="40" font-weight="700" fill="#f1f5f9" letter-spacing="1" filter="url(#textShadow)">
      Volodymyr Dvernytskyi
    </text>

    <!-- Thin accent line under name -->
    <line x1="0" y1="124" x2="300" y2="124" stroke="#0057b7" stroke-width="2" opacity="0.6"/>
    <line x1="300" y1="124" x2="460" y2="124" stroke="#ffd700" stroke-width="2" opacity="0.4"/>

    <!-- Subtitle / Role -->
    <text x="0" y="155" font-family="'Segoe UI', Tahoma, Geneva, sans-serif"
          font-size="15" fill="#94a3b8" letter-spacing="3" font-weight="300">
      DYNAMICS 365 BUSINESS CENTRAL · AL DEVELOPER
    </text>

    <!-- Links / tags row -->
    <g transform="translate(0, 175)">
      <!-- Blog tag -->
      <g opacity="0.7">
        <rect x="0" y="0" width="130" height="26" rx="4" fill="#1e293b" stroke="#334155" stroke-width="0.8"/>
        <text x="12" y="17" font-family="'Courier New', Courier, monospace" font-size="12" fill="#94a3b8">
          &#x1f310;  vld-bc.com
        </text>
      </g>

      <!-- GitHub tag -->
      <g opacity="0.7">
        <rect x="140" y="0" width="155" height="26" rx="4" fill="#1e293b" stroke="#334155" stroke-width="0.8"/>
        <text x="152" y="17" font-family="'Courier New', Courier, monospace" font-size="12" fill="#94a3b8">
          &#x2B22;  github/Drakonian
        </text>
      </g>

      <!-- Ukraine tag -->
      <g opacity="0.7">
        <rect x="305" y="0" width="105" height="26" rx="4" fill="#1e293b" stroke="#334155" stroke-width="0.8"/>
        <text x="317" y="17" font-family="'Courier New', Courier, monospace" font-size="12" fill="#94a3b8">
          &#x1F1FA;&#x1F1E6;  Ukraine
        </text>
      </g>
    </g>
  </g>

  <!-- Microsoft MVP Badge -->
  <g transform="translate(670, 100)">
    <g filter="url(#mvpGlow)">
      <!-- Badge outer ring -->
      <circle cx="45" cy="45" r="43" fill="none" stroke="#0078d4" stroke-width="1.5" opacity="0.5"/>
      <circle cx="45" cy="45" r="38" fill="url(#mvpGrad)" fill-opacity="0.15" stroke="#0078d4" stroke-width="0.8"/>

      <!-- Star shape for MVP -->
      <polygon points="45,10 51,30 72,30 56,42 61,62 45,51 29,62 34,42 18,30 39,30"
               fill="#0078d4" fill-opacity="0.3" stroke="#0078d4" stroke-width="0.8"/>

      <!-- MVP text -->
      <text x="45" y="82" text-anchor="middle" font-family="'Segoe UI', Tahoma, sans-serif"
            font-size="10" font-weight="600" fill="#60a5fa" letter-spacing="3">MICROSOFT</text>
      <text x="45" y="96" text-anchor="middle" font-family="'Segoe UI', Tahoma, sans-serif"
            font-size="14" font-weight="700" fill="#93c5fd" letter-spacing="4">MVP</text>
    </g>
  </g>

  <!-- Top edge accent line -->
  <rect x="0" y="0" width="800" height="2" fill="#0057b7" opacity="0.5"/>
  <rect x="0" y="0" width="400" height="2" fill="#0057b7" opacity="0.3"/>

  <!-- Bottom edge lines -->
  <rect x="0" y="298" width="800" height="2" fill="#ffd700" opacity="0.3"/>
  <rect x="400" y="298" width="400" height="2" fill="#0057b7" opacity="0.4"/>

  <!-- Subtle corner accents -->
  <g opacity="0.3">
    <!-- Top-left corner bracket -->
    <line x1="10" y1="10" x2="10" y2="40" stroke="#0057b7" stroke-width="1.5"/>
    <line x1="10" y1="10" x2="40" y2="10" stroke="#0057b7" stroke-width="1.5"/>

    <!-- Top-right corner bracket -->
    <line x1="790" y1="10" x2="790" y2="40" stroke="#ffd700" stroke-width="1.5"/>
    <line x1="790" y1="10" x2="760" y2="10" stroke="#ffd700" stroke-width="1.5"/>

    <!-- Bottom-left corner bracket -->
    <line x1="10" y1="290" x2="10" y2="260" stroke="#ffd700" stroke-width="1.5"/>
    <line x1="10" y1="290" x2="40" y2="290" stroke="#ffd700" stroke-width="1.5"/>

    <!-- Bottom-right corner bracket -->
    <line x1="790" y1="290" x2="790" y2="260" stroke="#0057b7" stroke-width="1.5"/>
    <line x1="790" y1="290" x2="760" y2="290" stroke="#0057b7" stroke-width="1.5"/>
  </g>
</svg>
