<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e17"/>
      <stop offset="40%" stop-color="#0d1321"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    
    <!-- Accent glow gradient (Ukrainian blue) -->
    <radialGradient id="glowBlue" cx="25%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#0057b7" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0057b7" stop-opacity="0"/>
    </radialGradient>
    
    <!-- Accent glow gradient (Ukrainian yellow) -->
    <radialGradient id="glowYellow" cx="80%" cy="30%" r="30%">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ffd700" stop-opacity="0"/>
    </radialGradient>

    <!-- MVP badge gradient -->
    <linearGradient id="mvpGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0078d4"/>
      <stop offset="100%" stop-color="#005a9e"/>
    </linearGradient>

    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5" opacity="0.4"/>
    </pattern>

    <!-- Dot pattern -->
    <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="0.6" fill="#334155" opacity="0.5"/>
    </pattern>

    <!-- Circuit line filter glow -->
    <filter id="lineGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Text shadow -->
    <filter id="textShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0057b7" flood-opacity="0.3"/>
    </filter>

    <!-- MVP glow -->
    <filter id="mvpGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Base background -->
  <rect width="1200" height="400" fill="url(#bgGrad)"/>
  
  <!-- Grid overlay -->
  <rect width="1200" height="400" fill="url(#grid)"/>
  <rect width="1200" height="400" fill="url(#dots)"/>
  
  <!-- Ambient glow layers -->
  <rect width="1200" height="400" fill="url(#glowBlue)"/>
  <rect width="1200" height="400" fill="url(#glowYellow)"/>

  <!-- Decorative circuit/code lines - left side -->
  <g opacity="0.25" filter="url(#lineGlow)">
    <!-- Horizontal lines -->
    <line x1="0" y1="80" x2="180" y2="80" stroke="#0057b7" stroke-width="1"/>
    <line x1="0" y1="120" x2="120" y2="120" stroke="#0057b7" stroke-width="0.7"/>
    <line x1="0" y1="280" x2="90" y2="280" stroke="#ffd700" stroke-width="0.7"/>
    <line x1="0" y1="320" x2="160" y2="320" stroke="#0057b7" stroke-width="1"/>
    
    <!-- Vertical branches -->
    <line x1="180" y1="80" x2="180" y2="130" stroke="#0057b7" stroke-width="1"/>
    <line x1="120" y1="120" x2="120" y2="160" stroke="#0057b7" stroke-width="0.7"/>
    <line x1="90" y1="280" x2="90" y2="240" stroke="#ffd700" stroke-width="0.7"/>
    <line x1="160" y1="320" x2="160" y2="350" stroke="#0057b7" stroke-width="1"/>
    
    <!-- Junction dots -->
    <circle cx="180" cy="80" r="3" fill="#0057b7"/>
    <circle cx="120" cy="120" r="2" fill="#0057b7"/>
    <circle cx="90" cy="280" r="2" fill="#ffd700"/>
    <circle cx="160" cy="320" r="3" fill="#0057b7"/>
    <circle cx="180" cy="130" r="2" fill="#0057b7"/>
    <circle cx="120" cy="160" r="2" fill="#0057b7"/>
    <circle cx="90" cy="240" r="2" fill="#ffd700"/>
  </g>

  <!-- Decorative circuit lines - right side -->
  <g opacity="0.2" filter="url(#lineGlow)">
    <line x1="1200" y1="100" x2="1040" y2="100" stroke="#ffd700" stroke-width="0.7"/>
    <line x1="1200" y1="140" x2="1080" y2="140" stroke="#0057b7" stroke-width="1"/>
    <line x1="1200" y1="260" x2="1060" y2="260" stroke="#0057b7" stroke-width="0.7"/>
    <line x1="1200" y1="310" x2="1020" y2="310" stroke="#ffd700" stroke-width="1"/>
    
    <line x1="1040" y1="100" x2="1040" y2="60" stroke="#ffd700" stroke-width="0.7"/>
    <line x1="1080" y1="140" x2="1080" y2="180" stroke="#0057b7" stroke-width="1"/>
    <line x1="1060" y1="260" x2="1060" y2="220" stroke="#0057b7" stroke-width="0.7"/>
    <line x1="1020" y1="310" x2="1020" y2="360" stroke="#ffd700" stroke-width="1"/>
    
    <circle cx="1040" cy="100" r="2" fill="#ffd700"/>
    <circle cx="1080" cy="140" r="3" fill="#0057b7"/>
    <circle cx="1060" cy="260" r="2" fill="#0057b7"/>
    <circle cx="1020" cy="310" r="3" fill="#ffd700"/>
  </g>

  <!-- Floating code fragments (AL-style) - decorative background text -->
  <g opacity="0.07" font-family="'Courier New', Courier, monospace" fill="#e2e8f0">
    <text x="50" y="50" font-size="11">procedure RunDataEditor(var Rec: Record)</text>
    <text x="720" y="45" font-size="10">trigger OnAfterGetRecord()</text>
    <text x="60" y="370" font-size="10">if RecRef.FindSet() then begin</text>
    <text x="800" y="380" font-size="11">FieldRef.Value := NewValue;</text>
    <text x="900" y="70" font-size="10">TableNo := RecRef.Number;</text>
    <text x="30" y="200" font-size="10">[EventSubscriber(ObjectType::Codeunit)]</text>
    <text x="850" y="200" font-size="10">exit(JsonResponse.AsObject());</text>
    <text x="400" y="25" font-size="10">var Customer: Record Customer;</text>
    <text x="30" y="155" font-size="10">Page.Run(Page::"Data Editor");</text>
    <text x="680" y="370" font-size="10">JsonToken.ReadFrom(ResponseText);</text>
    <text x="950" y="155" font-size="11">repeat until Rec.Next() = 0;</text>
    <text x="250" y="390" font-size="10">Codeunit.Run(Codeunit::"Parallel Session");</text>
  </g>

  <!-- BC Logo mark - stylized hexagonal shape -->
  <g transform="translate(115, 155)">
    <g opacity="0.9">
      <!-- Outer hexagon ring -->
      <polygon points="45,0 90,26 90,78 45,104 0,78 0,26" 
               fill="none" stroke="#0057b7" stroke-width="1.5" opacity="0.6"/>
      <!-- Inner hexagon -->
      <polygon points="45,15 78,34 78,70 45,89 12,70 12,34" 
               fill="#0057b7" fill-opacity="0.1" stroke="#0057b7" stroke-width="0.8" opacity="0.8"/>
      <!-- BC letters -->
      <text x="45" y="60" text-anchor="middle" font-family="'Segoe UI', Tahoma, sans-serif" 
            font-size="28" font-weight="700" fill="#e2e8f0" letter-spacing="2">BC</text>
    </g>
  </g>

  <!-- Main content group -->
  <g transform="translate(260, 0)">
    
    <!-- Name -->
    <text x="0" y="145" font-family="'Segoe UI', Tahoma, Geneva, sans-serif" 
          font-size="46" font-weight="700" fill="#f1f5f9" letter-spacing="1" filter="url(#textShadow)">
      Volodymyr Dvernytskyi
    </text>
    
    <!-- Thin accent line under name -->
    <line x1="0" y1="160" x2="320" y2="160" stroke="#0057b7" stroke-width="2" opacity="0.6"/>
    <line x1="320" y1="160" x2="520" y2="160" stroke="#ffd700" stroke-width="2" opacity="0.4"/>

    <!-- Subtitle / Role -->
    <text x="0" y="200" font-family="'Segoe UI', Tahoma, Geneva, sans-serif" 
          font-size="18" fill="#94a3b8" letter-spacing="3" font-weight="300">
      DYNAMICS 365 BUSINESS CENTRAL · AL DEVELOPER
    </text>

    <!-- Links / tags row -->
    <g transform="translate(0, 230)">
      <!-- Blog tag -->
      <g opacity="0.7">
        <rect x="0" y="0" width="150" height="28" rx="4" fill="#1e293b" stroke="#334155" stroke-width="0.8"/>
        <text x="14" y="18" font-family="'Courier New', Courier, monospace" font-size="13" fill="#94a3b8">
          &#x1f310;  vld-bc.com
        </text>
      </g>
      
      <!-- GitHub tag -->
      <g opacity="0.7">
        <rect x="162" y="0" width="170" height="28" rx="4" fill="#1e293b" stroke="#334155" stroke-width="0.8"/>
        <text x="176" y="18" font-family="'Courier New', Courier, monospace" font-size="13" fill="#94a3b8">
          &#x2B22;  github/Drakonian
        </text>
      </g>

      <!-- Ukraine tag -->
      <g opacity="0.7">
        <rect x="344" y="0" width="120" height="28" rx="4" fill="#1e293b" stroke="#334155" stroke-width="0.8"/>
        <text x="358" y="18" font-family="'Courier New', Courier, monospace" font-size="13" fill="#94a3b8">
          &#x1F1FA;&#x1F1E6;  Ukraine
        </text>
      </g>
    </g>
  </g>

  <!-- Microsoft MVP Badge -->
  <g transform="translate(1020, 135)">
    <g filter="url(#mvpGlow)">
      <!-- Badge outer ring -->
      <circle cx="50" cy="50" r="48" fill="none" stroke="#0078d4" stroke-width="1.5" opacity="0.5"/>
      <circle cx="50" cy="50" r="42" fill="url(#mvpGrad)" fill-opacity="0.15" stroke="#0078d4" stroke-width="0.8"/>
      
      <!-- Star shape for MVP -->
      <polygon points="50,14 57,36 80,36 62,48 68,70 50,57 32,70 38,48 20,36 43,36" 
               fill="#0078d4" fill-opacity="0.3" stroke="#0078d4" stroke-width="0.8"/>
      
      <!-- MVP text -->
      <text x="50" y="90" text-anchor="middle" font-family="'Segoe UI', Tahoma, sans-serif" 
            font-size="11" font-weight="600" fill="#60a5fa" letter-spacing="3">MICROSOFT</text>
      <text x="50" y="106" text-anchor="middle" font-family="'Segoe UI', Tahoma, sans-serif" 
            font-size="16" font-weight="700" fill="#93c5fd" letter-spacing="4">MVP</text>
    </g>
  </g>

  <!-- Top edge accent line -->
  <rect x="0" y="0" width="1200" height="2" fill="#0057b7" opacity="0.5"/>
  <rect x="0" y="0" width="600" height="2" fill="#0057b7" opacity="0.3"/>
  
  <!-- Bottom edge lines -->
  <rect x="0" y="398" width="1200" height="2" fill="#ffd700" opacity="0.3"/>
  <rect x="600" y="398" width="600" height="2" fill="#0057b7" opacity="0.4"/>

  <!-- Subtle corner accents -->
  <g opacity="0.3">
    <!-- Top-left corner bracket -->
    <line x1="10" y1="10" x2="10" y2="40" stroke="#0057b7" stroke-width="1.5"/>
    <line x1="10" y1="10" x2="40" y2="10" stroke="#0057b7" stroke-width="1.5"/>
    
    <!-- Top-right corner bracket -->
    <line x1="1190" y1="10" x2="1190" y2="40" stroke="#ffd700" stroke-width="1.5"/>
    <line x1="1190" y1="10" x2="1160" y2="10" stroke="#ffd700" stroke-width="1.5"/>
    
    <!-- Bottom-left corner bracket -->
    <line x1="10" y1="390" x2="10" y2="360" stroke="#ffd700" stroke-width="1.5"/>
    <line x1="10" y1="390" x2="40" y2="390" stroke="#ffd700" stroke-width="1.5"/>
    
    <!-- Bottom-right corner bracket -->
    <line x1="1190" y1="390" x2="1190" y2="360" stroke="#0057b7" stroke-width="1.5"/>
    <line x1="1190" y1="390" x2="1160" y2="390" stroke="#0057b7" stroke-width="1.5"/>
  </g>
</svg>
